# Render web service only — Postgres lives on Neon (set DATABASE_URL in dashboard).
# https://github.com/Korian99/dune-tracker/blob/main/docs/NEON_SETUP.md
services:
  - type: web
    name: dune-tracker
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
