# Deploy on Render: https://render.com — connect this GitHub repo as a Web Service.
services:
  - type: web
    name: dune-tracker
    runtime: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dune-tracker-db
          property: connectionString

databases:
  - name: dune-tracker-db
    plan: free
